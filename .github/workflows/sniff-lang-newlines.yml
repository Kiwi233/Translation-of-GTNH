name: Sniff Lang Newline Formats

# 月度任务：重新嗅探英文原文的换行符格式，提交到仓库作为历史基线。
# 每日构建也会在 runner 里即时嗅探一次（不 commit），因此即使本工作流延迟运行，
# 每日包仍能拿到最新缓存。
on:
  workflow_dispatch:
  schedule:
    # 每月 1 日 UTC 02:00（中国时间 10:00）
    - cron: '0 2 1 * *'

permissions:
  contents: write

env:
  REPO_PATH: .repo.local.d
  DAILY_HISTORY_PATH: .gtnh-translations.local.d/daily-history

jobs:
  sniff:
    name: Sniff Lang Newline Formats
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          path: ${{ env.REPO_PATH }}

      - name: Checkout GTNH-Translations (daily-history only)
        uses: actions/checkout@v4
        with:
          repository: GTNewHorizons/GTNH-Translations
          ref: master
          path: .gtnh-translations.local.d
          sparse-checkout: |
            daily-history
          sparse-checkout-cone-mode: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.5'

      - name: Sniff Newline Formats
        run: bun run -i ${{ env.REPO_PATH }}/.github/scripts/sniff-lang-newlines.ts
        env:
          DAILY_HISTORY_PATH: ${{ env.DAILY_HISTORY_PATH }}
          REPO_PATH: ${{ env.REPO_PATH }}

      - name: Commit Cache File
        working-directory: ${{ env.REPO_PATH }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/data/lang-newline-cache.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update lang newline format cache"
            git push
          fi
