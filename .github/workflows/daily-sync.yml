name: Daily Sync To PT (18818)

on:
  workflow_dispatch:
  schedule:
    # 中国时间每天凌晨 1 点（UTC 17:00）
    - cron: '0 17 * * *'

env:
  PARATRANZ_TOKEN: ${{ secrets.PARATRANZ_TOKEN }}
  # PT 18818 – daily auto-update project
  PARATRANZ_PROJECT_ID: ${{ secrets.PARATRANZ_DAILY_PROJECT_ID }}
  # PT 4964 – main manually-maintained project (translation source)
  SOURCE_PROJECT_ID: ${{ secrets.PARATRANZ_PROJECT_ID }}

  REPO_PATH: .repo.local.d
  DAILY_HISTORY_PATH: .gtnh-translations.local.d/daily-history

jobs:
  daily-sync:
    name: Daily Sync To PT
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Setup Compare Repo
        uses: Kiwi233/Translation-of-GTNH/.github/actions/setup-compare-repo@master

      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          path: ${{ env.REPO_PATH }}

      - name: Checkout GTNH-Translations (daily-history only)
        uses: actions/checkout@v4
        with:
          repository: GTNewHorizons/GTNH-Translations
          ref: master
          path: .gtnh-translations.local.d
          sparse-checkout: |
            daily-history
          sparse-checkout-cone-mode: true

      - name: Setup Bun
        uses: Kiwi233/Translation-of-GTNH/.github/actions/setup-bun@master

      - name: Patch Compare Scripts
        run: |
          cp ${{ env.REPO_PATH }}/.github/gtnh-compare-patches/rules.ts src/paratranz/converter/rules.ts
          cp ${{ env.REPO_PATH }}/.github/gtnh-compare-patches/converter-index.ts src/paratranz/converter/index.ts

      # Step 1: Upload latest English originals from daily-history to PT 18818
      - name: Lang And Zs To PT Daily (English Originals)
        run: >-
          bun run src/index.ts to-paratranz:lang-zs
          --modpack-path='${{ env.DAILY_HISTORY_PATH }}'
          --extra-lang='resources/**/en_US.lang'
          --extra-lang='config/**/en_US.lang'

      # Step 2: Copy latest Chinese translations from PT 4964 → PT 18818
      - name: Copy Translations From Main PT Project (4964 → 18818)
        run: bun run -i ${{ env.REPO_PATH }}/.github/actions/run-script/scripts/sync-translations-to-project.ts
        env:
          PARATRANZ_TOKEN: ${{ secrets.PARATRANZ_TOKEN }}
          SOURCE_PROJECT_ID: ${{ secrets.PARATRANZ_PROJECT_ID }}
          PARATRANZ_PROJECT_ID: ${{ secrets.PARATRANZ_DAILY_PROJECT_ID }}
