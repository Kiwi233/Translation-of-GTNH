name: 5. Gt Lang To Paratranz

on:
  workflow_dispatch:

env:
  PARATRANZ_TOKEN: ${{ secrets.PARATRANZ_TOKEN }}
  PARATRANZ_PROJECT_ID: ${{ secrets.PARATRANZ_PROJECT_ID }}

jobs:
  gt-lang-to-paratranz:
    name: Gt Lang To Paratranz
    runs-on: ubuntu-latest
    steps:
      - name: Setup Compare Repo
        uses: Kiwi233/Translation-of-GTNH/.github/actions/setup-compare-repo@master

      - name: Setup Bun
        uses: Kiwi233/Translation-of-GTNH/.github/actions/setup-bun@master

      - name: Gt Lang To Paratranz (from GTNH-Translations daily-history)
        # 注意：URL 固定指向 GTNewHorizons/GTNH-Translations 的 master 分支。
        # 若上游改变主分支名称，需同步更新此 URL。
        run: >-
          bun run src/index.ts to-paratranz:gt-lang
          --gt-lang-url='https://raw.githubusercontent.com/GTNewHorizons/GTNH-Translations/master/daily-history/GregTech.lang'
