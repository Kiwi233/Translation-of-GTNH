name: 'Ensure Modpack'
description: 'Download, extract and cache a GTNH modpack from a direct URL or a GitHub Actions artifact'
inputs:
  url:
    description: 'Direct download URL of the modpack zip (mutually exclusive with run-url)'
    required: false
    default: ''
  run-url:
    description: 'GitHub Actions run URL containing the modpack artifact (mutually exclusive with url)'
    required: false
    default: ''
  artifact-name:
    description: 'Artifact name pattern (glob) to download from the run (only used with run-url)'
    required: false
    default: '*mmcprism-new-java*'
  root:
    description: 'The target directory for the modpack content'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Validate inputs
      shell: bash
      env:
        INPUT_URL: ${{ inputs.url }}
        INPUT_RUN_URL: ${{ inputs.run-url }}
      run: |
        if [ -n "$INPUT_URL" ] && [ -n "$INPUT_RUN_URL" ]; then
          echo "::error::只能指定 'url' 或 'run-url' 之一，不能同时指定"
          exit 1
        fi
        if [ -z "$INPUT_URL" ] && [ -z "$INPUT_RUN_URL" ]; then
          echo "::error::必须指定 'url' 或 'run-url' 之一"
          exit 1
        fi

    - name: Compute cache key
      id: cache-key
      shell: bash
      env:
        INPUT_URL: ${{ inputs.url }}
        INPUT_RUN_URL: ${{ inputs.run-url }}
        INPUT_ARTIFACT_NAME: ${{ inputs.artifact-name }}
      run: |
        if [ -n "$INPUT_URL" ]; then
          echo "key=modpack-url-${INPUT_URL}" >> "$GITHUB_OUTPUT"
        else
          echo "key=modpack-artifact-${INPUT_RUN_URL}-${INPUT_ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"
        fi

    - name: Check if Bun is installed
      id: check-bun
      shell: bash
      run: |
        if command -v bun >/dev/null 2>&1; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Setup Bun
      if: steps.check-bun.outputs.exists != 'true'
      uses: Kiwi233/Translation-of-GTNH/.github/actions/setup-bun@master

    - name: Restore Modpack Cache
      id: cache
      uses: actions/cache/restore@v4
      with:
        path: ${{ inputs.root }}
        key: ${{ steps.cache-key.outputs.key }}

    - name: Download from direct URL
      if: steps.cache.outputs.cache-hit != 'true' && inputs.url != ''
      shell: bash
      env:
        MODPACK_URL: ${{ inputs.url }}
        MODPACK_ROOT: ${{ inputs.root }}
      run: bun run ${{ github.action_path }}/ensure-modpack-from-url.ts

    - name: Download from Actions artifact
      if: steps.cache.outputs.cache-hit != 'true' && inputs.run-url != ''
      shell: bash
      env:
        MODPACK_RUN_URL: ${{ inputs.run-url }}
        MODPACK_ARTIFACT_NAME: ${{ inputs.artifact-name }}
        MODPACK_ROOT: ${{ inputs.root }}
        GH_TOKEN: ${{ github.token }}
      run: bun run ${{ github.action_path }}/ensure-modpack-from-artifact.ts

    - name: Save Modpack Cache
      if: always() && steps.cache.outputs.cache-hit != 'true' && hashFiles(inputs.root) != ''
      uses: actions/cache/save@v4
      with:
        path: ${{ inputs.root }}
        key: ${{ steps.cache-key.outputs.key }}
