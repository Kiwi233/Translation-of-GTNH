---
name: 解析 整合包 中 lang 文件和 zs 文件 到 ParaTranz
description: 将特定 url 整合包 中 lang 文件和 zs 文件解析到 ParaTranz (仅内部使用)

labels: [ '自动化:lang+zs→paratranz' ]

body:
  - type: markdown
    attributes:
      value: |
        > **请二选一填写**：方式一（直链下载）和方式二（GitHub Actions Artifact）只能填写其中一个，另一个保持留空。

  - type: markdown
    attributes:
      value: |
        ### 方式一：直链下载
        如果整合包是普通的 HTTP/HTTPS 直链（例如 `.zip`），请填写以下字段：

  - type: input
    id: modpack-url
    attributes:
      label: 整合包直链 URL
      description: 例如 https://example.com/modpack.zip
      placeholder: https://...

  - type: markdown
    attributes:
      value: |
        ### 方式二：GitHub Actions Artifact
        如果整合包来自 GitHub Actions 的 artifact（例如 DreamAssemblerXXL 的每日构建），请填写以下字段：

  - type: input
    id: run-url
    attributes:
      label: GitHub Actions Run URL
      description: 例如 https://github.com/GTNewHorizons/DreamAssemblerXXL/actions/runs/24173925990
      placeholder: https://github.com/.../actions/runs/...

  - type: input
    id: artifact-name
    attributes:
      label: Artifact 名称（支持 glob 模式）
      description: 多数情况下保持默认值即可
      value: '*mmcprism-new-java*'
